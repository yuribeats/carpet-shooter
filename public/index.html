<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLYING MAGIC CARPET</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #4a90d9; overflow: hidden; font-family: Arial, sans-serif; font-weight: 700; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; }
#hud {
  position: fixed; top: 0; left: 0; width: 100%; padding: 20px;
  display: flex; justify-content: space-between; align-items: flex-start;
  pointer-events: none; z-index: 10;
}
.hud-text {
  color: #fff; font-size: 24px; text-transform: uppercase;
  letter-spacing: 2px; font-weight: 700;
}
#health-bar-bg {
  width: 200px; height: 12px; background: #333; margin-top: 8px;
}
#health-bar {
  width: 100%; height: 100%; background: #228B22; transition: width 0.3s;
}
#crosshair {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 10;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: #fff;
}
#crosshair::before {
  width: 2px; height: 30px; left: 50%; top: 50%; transform: translate(-50%, -50%);
}
#crosshair::after {
  width: 30px; height: 2px; left: 50%; top: 50%; transform: translate(-50%, -50%);
}
#start-screen, #game-over-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 20;
}
#game-over-screen { display: none; }
.title {
  color: #fff; font-size: 64px; text-transform: uppercase;
  letter-spacing: 8px; font-weight: 700; margin-bottom: 20px;
}
.subtitle {
  color: #888; font-size: 18px; text-transform: uppercase;
  letter-spacing: 4px; font-weight: 700; margin-bottom: 40px;
}
.btn {
  color: #fff; font-size: 24px; text-transform: uppercase;
  letter-spacing: 4px; font-weight: 700; background: none;
  border: 2px solid #fff; padding: 15px 40px; font-family: Arial, sans-serif;
  cursor: default; transition: background 0.2s;
}
.btn:hover { background: #228B22; border-color: #228B22; }
#ammo-display { text-align: right; }
#score-display { text-align: left; }
#damage-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255,0,0,0.3); pointer-events: none; z-index: 15;
  opacity: 0; transition: opacity 0.1s;
}
#hit-marker {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 15; opacity: 0;
  color: #228B22; font-size: 32px; font-weight: 700;
  font-family: Arial, sans-serif; text-transform: uppercase;
}
#wave-text {
  position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 15; opacity: 0;
  color: #fff; font-size: 48px; font-weight: 700;
  font-family: Arial, sans-serif; text-transform: uppercase;
  letter-spacing: 6px;
}
#final-score {
  color: #228B22; font-size: 48px; text-transform: uppercase;
  letter-spacing: 4px; font-weight: 700; margin-bottom: 10px;
}
@media (max-width: 768px) {
  .title { font-size: 28px; letter-spacing: 4px; }
  .subtitle { font-size: 12px; letter-spacing: 2px; margin-bottom: 15px; }
  .hud-text { font-size: 16px; }
  #health-bar-bg { width: 120px; height: 8px; }
  #hud { padding: 10px; }
  .btn { font-size: 18px; padding: 12px 30px; }
  #final-score { font-size: 36px; }
  #crosshair::before { height: 20px; }
  #crosshair::after { width: 20px; }
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="start-screen">
  <div class="title">FLYING MAGIC CARPET</div>
  <div class="subtitle" style="margin-bottom:15px;">FXDXLCWYMXmhhMypVxGHCC2sHA8n9d2fHhePViAYpump</div>
  <div class="subtitle" id="controls-text" style="color:#aaa; font-size:14px; margin-bottom:8px;">MOUSE: AIM / LEFT CLICK: SHOOT</div>
  <div class="subtitle" style="color:#ff6644; font-size:14px; margin-bottom:30px;">MUSIC WILL PLAY</div>
  <div class="subtitle" id="start-prompt" style="font-size:20px;">PRESS ANY KEY TO START</div>
</div>

<div id="game-over-screen">
  <div class="title">SHOT DOWN</div>
  <div id="final-score">0</div>
  <div class="subtitle">KILLS</div>
  <button class="btn" id="restart-btn">AGAIN</button>
</div>

<div id="hud">
  <div id="score-display">
    <div class="hud-text" id="score-text">SCORE: 0</div>
    <div class="hud-text" id="wave-label" style="font-size:16px; color:#888; margin-top:4px;">WAVE 1</div>
  </div>
  <div id="ammo-display">
    <div class="hud-text" id="ammo-text">30 / 30</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>
</div>

<div id="crosshair"></div>
<div id="damage-flash"></div>
<div id="hit-marker">HIT</div>
<div id="wave-text"></div>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, clock;
let carpet, player, ak47, muzzleFlash;
let jets = [];
let bullets = [];
let clouds = [];
let shellCasings = [];
let explosions = [];
let tracers = [];

let score = 0;
let health = 250;
let ammo = 30;
let maxAmmo = 30;
let reloading = false;
let reloadTime = 2.0;
let reloadTimer = 0;
let fireRate = 0.1;
let fireTimer = 0;
let firing = false;
let wave = 1;
let jetsPerWave = 2;
let jetSpeed = 0.3;
let jetShootInterval = 6.0;
let playing = false;
let carpetSway = 0;
let muzzleTimer = 0;
let shakeAmount = 0;
let waveDelay = 0;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0, 0);
const lookTarget = new THREE.Vector2(0, 0);
const lookSmooth = new THREE.Vector2(0, 0);
const sensitivity = 0.002;
const touchSensitivity = 0.004;
const cameraOffset = new THREE.Vector3(0, 4, 8);
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 1024);
let lastTouchX = 0;
let lastTouchY = 0;
let touchActive = false;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 100, 300);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 6, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  const ambient = new THREE.AmbientLight(0x99bbdd, 0.8);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff0d0, 3.0);
  sun.position.set(40, 60, 20);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 200;
  sun.shadow.camera.left = -30;
  sun.shadow.camera.right = 30;
  sun.shadow.camera.top = 30;
  sun.shadow.camera.bottom = -30;
  scene.add(sun);

  const fillLight = new THREE.DirectionalLight(0x8899bb, 0.4);
  fillLight.position.set(-30, 20, -20);
  scene.add(fillLight);

  const hemi = new THREE.HemisphereLight(0x87CEEB, 0xC4A882, 0.6);
  scene.add(hemi);

  buildCarpet();
  buildPlayer();
  buildAK47();
  spawnClouds();
  spawnWave();

  window.addEventListener('resize', onResize);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mousedown', () => { firing = true; });
  document.addEventListener('mouseup', () => { firing = false; });
  document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyR' && !reloading && ammo < maxAmmo) startReload();
  });
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // touch controls
  renderer.domElement.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
    touchActive = true;
    firing = true;
  }, { passive: false });

  renderer.domElement.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!playing || !touchActive) return;
    const touch = e.touches[0];
    const dx = touch.clientX - lastTouchX;
    const dy = touch.clientY - lastTouchY;
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
    lookTarget.x -= dx * touchSensitivity;
    lookTarget.y -= dy * touchSensitivity;
    lookTarget.y = Math.max(-1.2, Math.min(1.2, lookTarget.y));
    lookTarget.x = Math.max(-2.5, Math.min(2.5, lookTarget.x));
  }, { passive: false });

  renderer.domElement.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchActive = false;
    firing = false;
  }, { passive: false });

  // mobile UI
  if (isMobile) {
    document.getElementById('controls-text').textContent = 'DRAG: AIM / TOUCH: SHOOT';
    document.getElementById('start-prompt').textContent = 'TAP TO START';
  }

  animate();
}

function buildCarpet() {
  carpet = new THREE.Group();

  const carpetGeo = new THREE.PlaneGeometry(3, 5, 12, 20);
  const carpetMat = new THREE.MeshStandardMaterial({
    color: 0x8B0000,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0,
  });
  const carpetMesh = new THREE.Mesh(carpetGeo, carpetMat);
  carpetMesh.rotation.x = -Math.PI / 2;
  carpetMesh.position.y = -0.5;

  const positions = carpetGeo.attributes.position;
  carpetGeo.userData = { original: new Float32Array(positions.array) };

  carpet.add(carpetMesh);

  const borderGeo = new THREE.PlaneGeometry(3.2, 5.2, 1, 1);
  const borderMat = new THREE.MeshStandardMaterial({
    color: 0xDAA520,
    side: THREE.DoubleSide,
    roughness: 0.8,
  });
  const border = new THREE.Mesh(borderGeo, borderMat);
  border.rotation.x = -Math.PI / 2;
  border.position.y = -0.52;
  carpet.add(border);

  const fringeCount = 10;
  for (let i = 0; i < fringeCount; i++) {
    const fringeGeo = new THREE.BoxGeometry(0.08, 0.02, 0.4);
    const fringeMat = new THREE.MeshStandardMaterial({ color: 0xDAA520 });
    const fringe = new THREE.Mesh(fringeGeo, fringeMat);
    fringe.position.set(-1.4 + (i * 2.8 / (fringeCount - 1)), -0.5, 2.7);
    carpet.add(fringe);
    const fringe2 = fringe.clone();
    fringe2.position.z = -2.7;
    carpet.add(fringe2);
  }

  const patternGeo = new THREE.PlaneGeometry(2, 3.5);
  const patternCanvas = document.createElement('canvas');
  patternCanvas.width = 128;
  patternCanvas.height = 192;
  const ctx = patternCanvas.getContext('2d');
  ctx.fillStyle = '#8B0000';
  ctx.fillRect(0, 0, 128, 192);
  ctx.strokeStyle = '#DAA520';
  ctx.lineWidth = 3;
  ctx.strokeRect(10, 10, 108, 172);
  ctx.strokeRect(20, 20, 88, 152);
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j < 7; j++) {
      ctx.fillStyle = (i + j) % 2 === 0 ? '#A52A2A' : '#800000';
      ctx.fillRect(28 + i * 14, 28 + j * 20, 12, 16);
    }
  }
  const patternTex = new THREE.CanvasTexture(patternCanvas);
  const patternMat = new THREE.MeshStandardMaterial({
    map: patternTex,
    side: THREE.DoubleSide,
    transparent: true,
  });
  const pattern = new THREE.Mesh(patternGeo, patternMat);
  pattern.rotation.x = -Math.PI / 2;
  pattern.position.y = -0.49;
  carpet.add(pattern);

  carpet.position.set(0, 0, 0);
  scene.add(carpet);
}

function buildPlayer() {
  player = new THREE.Group();

  // materials - smooth, natural look
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xC49A6C, roughness: 0.65, metalness: 0.02 });
  const shirtMat = new THREE.MeshStandardMaterial({ color: 0x3a3a2a, roughness: 0.85 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2a2a22, roughness: 0.9 });
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 });
  const bootMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8, metalness: 0.1 });

  // helper: create a limb segment (capsule-like) between two points
  function limb(mat, r1, r2, p1, p2) {
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const len = dir.length();
    const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    const geo = new THREE.CylinderGeometry(r1, r2, len, 12);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(mid);
    // orient cylinder along direction
    const up = new THREE.Vector3(0, 1, 0);
    const q = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
    mesh.quaternion.copy(q);
    mesh.castShadow = true;
    return mesh;
  }

  // joint sphere for smooth connections
  function joint(mat, r, pos) {
    const geo = new THREE.SphereGeometry(r, 12, 12);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.castShadow = true;
    return mesh;
  }

  // key body points (crouching, hunched forward, aiming)
  const hip = new THREE.Vector3(0, 0.2, 0);
  const chest = new THREE.Vector3(0, 0.5, -0.2);
  const neckPt = new THREE.Vector3(0, 0.7, -0.38);
  const headPt = new THREE.Vector3(0, 0.85, -0.45);

  // right arm (trigger hand)
  const rShoulder = new THREE.Vector3(0.28, 0.6, -0.28);
  const rElbow = new THREE.Vector3(0.32, 0.42, -0.55);
  const rHand = new THREE.Vector3(0.22, 0.35, -0.78);

  // left arm (forestock hand, reaching forward)
  const lShoulder = new THREE.Vector3(-0.28, 0.6, -0.28);
  const lElbow = new THREE.Vector3(-0.22, 0.4, -0.6);
  const lHand = new THREE.Vector3(-0.1, 0.32, -0.9);

  // right leg (crouching)
  const rHip = new THREE.Vector3(0.14, 0.18, 0);
  const rKnee = new THREE.Vector3(0.18, 0.06, 0.25);
  const rAnkle = new THREE.Vector3(0.18, -0.06, 0.42);

  // left leg
  const lHip = new THREE.Vector3(-0.14, 0.18, 0);
  const lKnee = new THREE.Vector3(-0.18, 0.06, 0.25);
  const lAnkle = new THREE.Vector3(-0.18, -0.06, 0.42);

  // TORSO - lathe profile for organic shape
  const torsoProfile = [
    new THREE.Vector2(0.14, 0),    // waist
    new THREE.Vector2(0.16, 0.08),
    new THREE.Vector2(0.2, 0.18),  // belly
    new THREE.Vector2(0.23, 0.28), // ribs
    new THREE.Vector2(0.24, 0.35), // chest
    new THREE.Vector2(0.22, 0.42),
    new THREE.Vector2(0.15, 0.48), // shoulders narrow
    new THREE.Vector2(0.08, 0.52), // neck base
  ];
  const torsoGeo = new THREE.LatheGeometry(torsoProfile, 16);
  const torsoMesh = new THREE.Mesh(torsoGeo, shirtMat);
  torsoMesh.position.copy(hip);
  torsoMesh.castShadow = true;
  // tilt torso forward for crouching
  const torsoDir = new THREE.Vector3().subVectors(neckPt, hip).normalize();
  const torsoQ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), torsoDir);
  torsoMesh.quaternion.copy(torsoQ);
  player.add(torsoMesh);

  // shoulder pads - wider look
  player.add(joint(shirtMat, 0.13, new THREE.Vector3(0.3, 0.58, -0.26)));
  player.add(joint(shirtMat, 0.13, new THREE.Vector3(-0.3, 0.58, -0.26)));

  // NECK
  player.add(limb(skinMat, 0.08, 0.07, neckPt, headPt));
  player.add(joint(skinMat, 0.09, neckPt));

  // HEAD - composite for more realistic shape
  const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.19, 16, 16), skinMat);
  headMesh.position.copy(headPt);
  headMesh.scale.set(0.95, 1.1, 0.9);
  headMesh.castShadow = true;
  player.add(headMesh);

  // jaw
  const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 10), skinMat);
  jawMesh.position.set(headPt.x, headPt.y - 0.1, headPt.z - 0.04);
  jawMesh.scale.set(0.9, 0.6, 0.85);
  player.add(jawMesh);

  // nose
  const noseMesh = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.08, 6), skinMat);
  noseMesh.position.set(headPt.x, headPt.y - 0.02, headPt.z - 0.2);
  noseMesh.rotation.x = -Math.PI / 2;
  player.add(noseMesh);

  // ears
  for (let side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), skinMat);
    ear.position.set(headPt.x + side * 0.18, headPt.y - 0.02, headPt.z + 0.02);
    ear.scale.set(0.5, 1, 0.7);
    player.add(ear);
  }

  // HAIR - better coverage
  const hairMain = new THREE.Mesh(new THREE.SphereGeometry(0.2, 14, 14), hairMat);
  hairMain.position.set(headPt.x, headPt.y + 0.06, headPt.z + 0.03);
  hairMain.scale.set(1, 0.7, 1.05);
  player.add(hairMain);
  // hair sides
  for (let side of [-1, 1]) {
    const hairSide = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), hairMat);
    hairSide.position.set(headPt.x + side * 0.14, headPt.y + 0.02, headPt.z + 0.04);
    hairSide.scale.set(0.7, 0.9, 0.8);
    player.add(hairSide);
  }

  // RIGHT ARM
  player.add(joint(shirtMat, 0.1, rShoulder));
  player.add(limb(shirtMat, 0.08, 0.065, rShoulder, rElbow));
  player.add(joint(skinMat, 0.065, rElbow));
  player.add(limb(skinMat, 0.06, 0.05, rElbow, rHand));
  player.add(joint(skinMat, 0.055, rHand));

  // LEFT ARM
  player.add(joint(shirtMat, 0.1, lShoulder));
  player.add(limb(shirtMat, 0.08, 0.065, lShoulder, lElbow));
  player.add(joint(skinMat, 0.065, lElbow));
  player.add(limb(skinMat, 0.06, 0.05, lElbow, lHand));
  player.add(joint(skinMat, 0.055, lHand));

  // RIGHT LEG
  player.add(joint(pantsMat, 0.1, rHip));
  player.add(limb(pantsMat, 0.1, 0.08, rHip, rKnee));
  player.add(joint(pantsMat, 0.08, rKnee));
  player.add(limb(pantsMat, 0.075, 0.065, rKnee, rAnkle));
  player.add(joint(bootMat, 0.07, rAnkle));
  // boot
  const bootRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.07, 0.2), bootMat);
  bootRMesh.position.set(rAnkle.x, rAnkle.y - 0.03, rAnkle.z + 0.04);
  player.add(bootRMesh);

  // LEFT LEG
  player.add(joint(pantsMat, 0.1, lHip));
  player.add(limb(pantsMat, 0.1, 0.08, lHip, lKnee));
  player.add(joint(pantsMat, 0.08, lKnee));
  player.add(limb(pantsMat, 0.075, 0.065, lKnee, lAnkle));
  player.add(joint(bootMat, 0.07, lAnkle));
  const bootLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.07, 0.2), bootMat);
  bootLMesh.position.set(lAnkle.x, lAnkle.y - 0.03, lAnkle.z + 0.04);
  player.add(bootLMesh);

  player.position.set(0, -0.35, 0.3);
  carpet.add(player);
}

function buildAK47() {
  ak47 = new THREE.Group();

  const bodyGeo = new THREE.BoxGeometry(0.08, 0.08, 1.2);
  const metalMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, metalMat);
  ak47.add(body);

  const barrelGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.6, 8);
  const barrel = new THREE.Mesh(barrelGeo, metalMat);
  barrel.rotation.x = Math.PI / 2;
  barrel.position.z = -0.9;
  ak47.add(barrel);

  const stockGeo = new THREE.BoxGeometry(0.06, 0.1, 0.5);
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
  const stock = new THREE.Mesh(stockGeo, woodMat);
  stock.position.set(0, -0.02, 0.6);
  ak47.add(stock);

  const gripGeo = new THREE.BoxGeometry(0.05, 0.18, 0.06);
  const grip = new THREE.Mesh(gripGeo, woodMat);
  grip.position.set(0, -0.12, 0.15);
  grip.rotation.x = 0.3;
  ak47.add(grip);

  const magGeo = new THREE.BoxGeometry(0.06, 0.25, 0.12);
  const mag = new THREE.Mesh(magGeo, metalMat.clone());
  mag.material.color.set(0x444444);
  mag.position.set(0, -0.2, -0.1);
  mag.rotation.x = 0.15;
  ak47.add(mag);

  const handguardGeo = new THREE.BoxGeometry(0.09, 0.09, 0.35);
  const handguard = new THREE.Mesh(handguardGeo, woodMat);
  handguard.position.z = -0.5;
  ak47.add(handguard);

  const gasGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.4, 6);
  const gasTube = new THREE.Mesh(gasGeo, metalMat);
  gasTube.rotation.x = Math.PI / 2;
  gasTube.position.set(0, 0.06, -0.5);
  ak47.add(gasTube);

  const sightFrontGeo = new THREE.BoxGeometry(0.02, 0.06, 0.02);
  const sightFront = new THREE.Mesh(sightFrontGeo, metalMat);
  sightFront.position.set(0, 0.07, -0.75);
  ak47.add(sightFront);

  const sightRearGeo = new THREE.BoxGeometry(0.04, 0.04, 0.02);
  const sightRear = new THREE.Mesh(sightRearGeo, metalMat);
  sightRear.position.set(0, 0.07, -0.2);
  ak47.add(sightRear);

  const muzzleGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const muzzleMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
  muzzleFlash = new THREE.Mesh(muzzleGeo, muzzleMat);
  muzzleFlash.position.z = -1.3;
  ak47.add(muzzleFlash);

  const muzzleLight = new THREE.PointLight(0xffaa00, 0, 5);
  muzzleLight.position.copy(muzzleFlash.position);
  ak47.add(muzzleLight);
  ak47.userData.muzzleLight = muzzleLight;

  ak47.scale.set(1.1, 1.1, 1.1);
  ak47.position.set(0.15, 0.32, -0.55);
  ak47.rotation.x = -0.1;
  player.add(ak47);
}

function createJet() {
  const jet = new THREE.Group();

  const jetMat = new THREE.MeshStandardMaterial({ color: 0x8B7D6B, metalness: 0.35, roughness: 0.55 });
  const jetDark = new THREE.MeshStandardMaterial({ color: 0x5C5040, metalness: 0.4, roughness: 0.5 });
  const jetLight = new THREE.MeshStandardMaterial({ color: 0xA89880, metalness: 0.3, roughness: 0.6 });
  const exhaustMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.9, roughness: 0.15 });

  // fuselage - long tapered cylinder
  const fuse1 = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.7, 5, 16), jetMat);
  fuse1.rotation.x = Math.PI / 2;
  fuse1.position.z = 0;
  fuse1.castShadow = true;
  jet.add(fuse1);

  // rear fuselage narrows
  const fuse2 = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.55, 3, 16), jetMat);
  fuse2.rotation.x = Math.PI / 2;
  fuse2.position.z = 4;
  jet.add(fuse2);

  // nose cone
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.55, 3, 16), jetLight);
  nose.rotation.x = Math.PI / 2;
  nose.position.z = -4;
  nose.castShadow = true;
  jet.add(nose);

  // radome tip
  const radome = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), jetDark);
  radome.position.z = -5.5;
  jet.add(radome);

  // canopy
  const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.55),
    new THREE.MeshStandardMaterial({ color: 0x557799, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0.45 })
  );
  canopy.position.set(0, 0.45, -1.5);
  jet.add(canopy);

  // canopy rail
  const canopyRail = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.06, 1.2), jetDark);
  canopyRail.position.set(0, 0.7, -1.5);
  jet.add(canopyRail);

  // main wings - swept, tapered
  for (let side of [-1, 1]) {
    const wingGeo = new THREE.BoxGeometry(5.5, 0.1, 2.2);
    const wing = new THREE.Mesh(wingGeo, jetMat);
    wing.position.set(side * 3.2, -0.05, 0.3);
    wing.rotation.z = side * 0.02;
    wing.castShadow = true;
    jet.add(wing);

    // wing tip
    const tipGeo = new THREE.BoxGeometry(0.8, 0.08, 1.4);
    const tip = new THREE.Mesh(tipGeo, jetDark);
    tip.position.set(side * 5.9, -0.05, 0.6);
    jet.add(tip);

    // leading edge slat
    const slatGeo = new THREE.BoxGeometry(4.5, 0.06, 0.2);
    const slat = new THREE.Mesh(slatGeo, jetDark);
    slat.position.set(side * 3.5, -0.02, -0.8);
    jet.add(slat);
  }

  // horizontal stabilizers
  for (let side of [-1, 1]) {
    const stabGeo = new THREE.BoxGeometry(2.5, 0.08, 1.2);
    const stab = new THREE.Mesh(stabGeo, jetDark);
    stab.position.set(side * 1.6, 0.1, 4.8);
    jet.add(stab);
  }

  // vertical stabilizer (single tall tail)
  const vertGeo = new THREE.BoxGeometry(0.1, 2.8, 2);
  const vert = new THREE.Mesh(vertGeo, jetDark);
  vert.position.set(0, 1.5, 4.5);
  jet.add(vert);

  // rudder
  const rudder = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.2, 0.6), jetMat);
  rudder.position.set(0, 1.4, 5.4);
  jet.add(rudder);

  // engine exhaust nozzle
  const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.35, 1.2, 12), exhaustMat);
  nozzle.rotation.x = Math.PI / 2;
  nozzle.position.z = 5.8;
  jet.add(nozzle);

  // inner exhaust ring
  const innerNozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.4, 10), exhaustMat);
  innerNozzle.rotation.x = Math.PI / 2;
  innerNozzle.position.z = 6.3;
  jet.add(innerNozzle);

  // afterburner flame
  const afterburner = new THREE.Mesh(
    new THREE.ConeGeometry(0.3, 3, 8),
    new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0.5 })
  );
  afterburner.rotation.x = -Math.PI / 2;
  afterburner.position.z = 7.5;
  jet.add(afterburner);

  const afterburnerInner = new THREE.Mesh(
    new THREE.ConeGeometry(0.12, 2, 8),
    new THREE.MeshBasicMaterial({ color: 0xffcc44, transparent: true, opacity: 0.7 })
  );
  afterburnerInner.rotation.x = -Math.PI / 2;
  afterburnerInner.position.z = 7;
  jet.add(afterburnerInner);

  // underwing pylons + missiles
  for (let side of [-1, 1]) {
    for (let p = 0; p < 2; p++) {
      const px = side * (1.8 + p * 1.8);
      const pylonGeo = new THREE.BoxGeometry(0.06, 0.2, 0.5);
      const pylon = new THREE.Mesh(pylonGeo, jetDark);
      pylon.position.set(px, -0.25, 0.3);
      jet.add(pylon);

      const missileBody = new THREE.Mesh(
        new THREE.CylinderGeometry(0.045, 0.04, 1.4, 6),
        new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6, roughness: 0.3 })
      );
      missileBody.rotation.x = Math.PI / 2;
      missileBody.position.set(px, -0.42, 0.3);
      jet.add(missileBody);

      const missileTip = new THREE.Mesh(
        new THREE.ConeGeometry(0.045, 0.25, 6),
        new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.5 })
      );
      missileTip.rotation.x = Math.PI / 2;
      missileTip.position.set(px, -0.42, -0.5);
      jet.add(missileTip);

      // missile fins
      for (let f of [-1, 1]) {
        const finGeo = new THREE.BoxGeometry(0.2, 0.01, 0.12);
        const fin = new THREE.Mesh(finGeo, new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
        fin.position.set(px + f * 0.1, -0.42, 0.85);
        jet.add(fin);
      }
    }
  }

  // intakes
  for (let side of [-1, 1]) {
    const intakeGeo = new THREE.CylinderGeometry(0.3, 0.35, 1.8, 10);
    const intake = new THREE.Mesh(intakeGeo, exhaustMat);
    intake.rotation.x = Math.PI / 2;
    intake.position.set(side * 0.55, -0.15, -1.8);
    jet.add(intake);

    // intake lip
    const lip = new THREE.Mesh(
      new THREE.TorusGeometry(0.35, 0.04, 6, 12),
      jetLight
    );
    lip.position.set(side * 0.55, -0.15, -2.7);
    jet.add(lip);
  }

  const hitbox = new THREE.Mesh(
    new THREE.BoxGeometry(12, 3, 12),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  jet.add(hitbox);
  jet.userData.hitbox = hitbox;

  jet.userData.health = 100;
  jet.userData.maxHealth = 100;
  jet.userData.shootTimer = Math.random() * jetShootInterval;
  jet.userData.alive = true;
  jet.userData.afterburner = afterburner;
  jet.userData.afterburnerInner = afterburnerInner;
  jet.userData.sway = Math.random() * Math.PI * 2;
  jet.userData.swaySpeed = 0.3 + Math.random() * 0.4;
  jet.userData.swayAmount = 1 + Math.random() * 2;

  jet.scale.set(1.4, 1.4, 1.4);
  return jet;
}

function spawnWave() {
  const count = jetsPerWave + Math.floor(wave / 2);
  for (let i = 0; i < count; i++) {
    const jet = createJet();
    const angle = (i / count) * Math.PI * 1.2 - Math.PI * 0.6;
    const dist = 40 + Math.random() * 30;
    jet.position.set(
      Math.sin(angle) * dist,
      5 + Math.random() * 15,
      -(30 + Math.random() * 40)
    );
    jet.userData.basePos = jet.position.clone();
    scene.add(jet);
    jets.push(jet);
  }
}

function showWaveText(text) {
  const el = document.getElementById('wave-text');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function spawnClouds() {
  for (let i = 0; i < 40; i++) {
    const cloud = new THREE.Group();
    const count = 3 + Math.floor(Math.random() * 4);
    for (let j = 0; j < count; j++) {
      const size = 3 + Math.random() * 6;
      const geo = new THREE.SphereGeometry(size, 8, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff, transparent: true, opacity: 0.7 + Math.random() * 0.2
      });
      const puff = new THREE.Mesh(geo, mat);
      puff.position.set(
        (Math.random() - 0.5) * size * 2,
        (Math.random() - 0.5) * size,
        (Math.random() - 0.5) * size * 2
      );
      cloud.add(puff);
    }
    cloud.position.set(
      (Math.random() - 0.5) * 300,
      -5 + Math.random() * 40,
      -200 + Math.random() * 250
    );
    scene.add(cloud);
    clouds.push(cloud);
  }
}

function shoot() {
  if (fireTimer > 0) return;
  fireTimer = fireRate;

  muzzleFlash.material.opacity = 0.9;
  ak47.userData.muzzleLight.intensity = 3;
  muzzleTimer = 0.05;

  shakeAmount = 0.02;

  ak47.position.z += 0.05;
  setTimeout(() => { if (ak47) ak47.position.z -= 0.05; }, 50);

  spawnShellCasing();

  const worldMuzzlePos = new THREE.Vector3();
  muzzleFlash.getWorldPosition(worldMuzzlePos);
  const aimTarget = new THREE.Vector3(0, 0, -1);
  aimTarget.applyQuaternion(camera.quaternion);
  const aimPoint = camera.position.clone().add(aimTarget.multiplyScalar(100));
  const dir = aimPoint.sub(worldMuzzlePos).normalize();

  const spread = 0.015;
  dir.x += (Math.random() - 0.5) * spread;
  dir.y += (Math.random() - 0.5) * spread;
  dir.normalize();

  const tracerGeo = new THREE.CylinderGeometry(0.01, 0.01, 2, 4);
  const tracerMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
  const tracer = new THREE.Mesh(tracerGeo, tracerMat);
  tracer.position.copy(worldMuzzlePos);
  tracer.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  tracer.userData.dir = dir.clone();
  tracer.userData.life = 1.5;
  scene.add(tracer);
  tracers.push(tracer);

  raycaster.set(worldMuzzlePos, dir);
  const hitboxes = jets.filter(j => j.userData.alive).map(j => j.userData.hitbox);
  const hits = raycaster.intersectObjects(hitboxes);
  if (hits.length > 0) {
    const hitJet = hits[0].object.parent;
    const dmg = 15 + Math.random() * 10;
    hitJet.userData.health -= dmg;

    spawnSparks(hits[0].point);
    showHitMarker();

    if (hitJet.userData.health <= 0 && hitJet.userData.alive) {
      hitJet.userData.alive = false;
      score++;
      updateHUD();
      spawnExplosion(hitJet.position.clone());
      scene.remove(hitJet);
      jets = jets.filter(j => j !== hitJet);

      if (jets.filter(j => j.userData.alive).length === 0) {
        wave++;
        jetSpeed += 0.05;
        jetShootInterval = Math.max(2.5, jetShootInterval - 0.3);
        waveDelay = 2.0;
      }
    }
  }

}

function startReload() {
  reloading = true;
  reloadTimer = reloadTime;
}

function spawnShellCasing() {
  const geo = new THREE.CylinderGeometry(0.015, 0.012, 0.06, 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.8 });
  const shell = new THREE.Mesh(geo, mat);
  const worldPos = new THREE.Vector3();
  ak47.getWorldPosition(worldPos);
  shell.position.copy(worldPos);
  shell.position.x += 0.15;
  shell.userData.vel = new THREE.Vector3(
    0.5 + Math.random() * 0.5,
    2 + Math.random(),
    (Math.random() - 0.5) * 0.5
  );
  shell.userData.life = 2;
  scene.add(shell);
  shellCasings.push(shell);
}

function spawnSparks(pos) {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.SphereGeometry(0.05, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    const spark = new THREE.Mesh(geo, mat);
    spark.position.copy(pos);
    spark.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 5,
      (Math.random() - 0.5) * 5,
      (Math.random() - 0.5) * 5
    );
    spark.userData.life = 0.3 + Math.random() * 0.3;
    scene.add(spark);
    shellCasings.push(spark);
  }
}

function spawnExplosion(pos) {
  const group = new THREE.Group();
  group.position.copy(pos);

  for (let i = 0; i < 20; i++) {
    const size = 0.5 + Math.random() * 1.5;
    const geo = new THREE.SphereGeometry(size, 6, 6);
    const color = [0xff4400, 0xff8800, 0xffcc00, 0xff2200][Math.floor(Math.random() * 4)];
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
    const chunk = new THREE.Mesh(geo, mat);
    chunk.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      (Math.random() - 0.5) * 8,
      (Math.random() - 0.5) * 8
    );
    group.add(chunk);
  }

  for (let i = 0; i < 10; i++) {
    const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
    const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });
    const debris = new THREE.Mesh(geo, mat);
    debris.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 12,
      (Math.random() - 0.5) * 12,
      (Math.random() - 0.5) * 12
    );
    debris.userData.rotVel = new THREE.Vector3(
      Math.random() * 5, Math.random() * 5, Math.random() * 5
    );
    group.add(debris);
  }

  group.userData.life = 2;
  scene.add(group);
  explosions.push(group);

  const flash = new THREE.PointLight(0xff4400, 10, 50);
  flash.position.copy(pos);
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 300);
}

function jetShootAtPlayer(jet) {
  const tracerGeo = new THREE.CylinderGeometry(0.03, 0.03, 3, 4);
  const tracerMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
  const tracer = new THREE.Mesh(tracerGeo, tracerMat);
  tracer.position.copy(jet.position);

  const targetPos = carpet.position.clone();
  targetPos.x += (Math.random() - 0.5) * 4;
  targetPos.y += (Math.random() - 0.5) * 3;

  const dir = targetPos.sub(jet.position).normalize();
  tracer.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  tracer.userData.dir = dir;
  tracer.userData.life = 3;
  tracer.userData.enemy = true;
  tracer.userData.speed = 80;
  scene.add(tracer);
  tracers.push(tracer);
}

function showHitMarker() {
  const el = document.getElementById('hit-marker');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 150);
}

function showDamageFlash() {
  const el = document.getElementById('damage-flash');

  setTimeout(() => { el.style.opacity = '0'; }, 200);
}

function updateHUD() {
  document.getElementById('score-text').textContent = 'SCORE: ' + score;
  document.getElementById('ammo-text').textContent = 'INF';
  document.getElementById('health-bar').style.width = (health / 250 * 100) + '%';
  if (health < 75) {
    document.getElementById('health-bar').style.background = '#ff2222';
  } else if (health < 150) {
    document.getElementById('health-bar').style.background = '#ffaa00';
  } else {
    document.getElementById('health-bar').style.background = '#228B22';
  }
}

function onMouseMove(e) {
  if (!playing) return;
  lookTarget.x -= e.movementX * sensitivity;
  lookTarget.y -= e.movementY * sensitivity;
  lookTarget.y = Math.max(-1.2, Math.min(1.2, lookTarget.y));
  lookTarget.x = Math.max(-2.5, Math.min(2.5, lookTarget.x));
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animateCarpet(time, dt) {
  carpetSway += dt;
  carpet.position.y = Math.sin(carpetSway * 0.8) * 0.3;
  carpet.rotation.x = Math.sin(carpetSway * 0.6) * 0.03;
  carpet.rotation.z = Math.sin(carpetSway * 0.4) * 0.02;

  const mesh = carpet.children[0];
  if (mesh.geometry && mesh.geometry.userData.original) {
    const positions = mesh.geometry.attributes.position;
    const orig = mesh.geometry.userData.original;
    for (let i = 0; i < positions.count; i++) {
      const x = orig[i * 3];
      const y = orig[i * 3 + 1];
      const z = orig[i * 3 + 2];
      positions.array[i * 3 + 2] = z + Math.sin(x * 2 + time * 3) * 0.08 + Math.sin(y * 1.5 + time * 2) * 0.05;
    }
    positions.needsUpdate = true;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  if (!playing) {
    renderer.render(scene, camera);
    return;
  }

  lookSmooth.x += (lookTarget.x - lookSmooth.x) * 8 * dt;
  lookSmooth.y += (lookTarget.y - lookSmooth.y) * 8 * dt;

  animateCarpet(time, dt);

  const carpetWorldPos = new THREE.Vector3();
  carpet.getWorldPosition(carpetWorldPos);

  const camTarget = carpetWorldPos.clone().add(cameraOffset);
  camera.position.lerp(camTarget, 5 * dt);

  const lookAt = carpetWorldPos.clone();
  lookAt.z -= 40;
  lookAt.x += lookSmooth.x * -25;
  lookAt.y += lookSmooth.y * -15 + 2;
  camera.lookAt(lookAt);

  if (shakeAmount > 0) {
    camera.rotation.x += (Math.random() - 0.5) * shakeAmount;
    camera.rotation.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.85;
  }

  if (player) {
    player.rotation.y = lookSmooth.x * 0.5;
    ak47.rotation.x = lookSmooth.y * 0.8 - 0.15;
  }

  if (fireTimer > 0) fireTimer -= dt;
  if (firing && playing) shoot();

  if (reloading) {
    reloadTimer -= dt;
    if (reloadTimer <= 0) {
      reloading = false;
      ammo = maxAmmo;
      updateHUD();
    } else {
      updateHUD();
    }
  }

  if (muzzleTimer > 0) {
    muzzleTimer -= dt;
    if (muzzleTimer <= 0) {
      muzzleFlash.material.opacity = 0;
      ak47.userData.muzzleLight.intensity = 0;
    }
  }

  jets.forEach(jet => {
    if (!jet.userData.alive) return;
    jet.userData.sway += dt * jet.userData.swaySpeed;
    jet.position.x = jet.userData.basePos.x + Math.sin(jet.userData.sway) * jet.userData.swayAmount;
    jet.position.y = jet.userData.basePos.y + Math.cos(jet.userData.sway * 0.7) * 1;

    jet.userData.afterburner.scale.x = 0.8 + Math.random() * 0.4;
    jet.userData.afterburner.scale.y = 0.8 + Math.random() * 0.4;
    jet.userData.afterburner.material.opacity = 0.3 + Math.random() * 0.3;
    if (jet.userData.afterburnerInner) {
      jet.userData.afterburnerInner.scale.x = 0.7 + Math.random() * 0.5;
      jet.userData.afterburnerInner.scale.y = 0.7 + Math.random() * 0.5;
      jet.userData.afterburnerInner.material.opacity = 0.5 + Math.random() * 0.3;
    }

    jet.userData.shootTimer -= dt;
    if (jet.userData.shootTimer <= 0) {
      jet.userData.shootTimer = jetShootInterval * (0.7 + Math.random() * 0.6);
      jetShootAtPlayer(jet);
    }
  });

  for (let i = tracers.length - 1; i >= 0; i--) {
    const t = tracers[i];
    const speed = t.userData.enemy ? t.userData.speed : 150;
    t.position.addScaledVector(t.userData.dir, speed * dt);
    t.userData.life -= dt;

    if (t.userData.enemy) {
      const carpetPos = new THREE.Vector3();
      carpet.getWorldPosition(carpetPos);
      carpetPos.y += 1;
      const dist = t.position.distanceTo(carpetPos);
      if (dist < 3) {
        const dmg = 5 + Math.random() * 5;
        health -= dmg;
        showDamageFlash();
        updateHUD();
        scene.remove(t);
        tracers.splice(i, 1);

        if (health <= 0) {
          health = 0;
          updateHUD();
          gameOver();
        }
        continue;
      }
    }

    if (t.userData.life <= 0) {
      scene.remove(t);
      tracers.splice(i, 1);
    }
  }

  for (let i = shellCasings.length - 1; i >= 0; i--) {
    const s = shellCasings[i];
    s.position.addScaledVector(s.userData.vel, dt);
    s.userData.vel.y -= 9.8 * dt;
    s.userData.life -= dt;
    if (s.userData.life <= 0) {
      scene.remove(s);
      shellCasings.splice(i, 1);
    }
  }

  for (let i = explosions.length - 1; i >= 0; i--) {
    const exp = explosions[i];
    exp.userData.life -= dt;
    const progress = 1 - (exp.userData.life / 2);
    exp.children.forEach(child => {
      if (child.userData.vel) {
        child.position.addScaledVector(child.userData.vel, dt);
        child.userData.vel.y -= 5 * dt;
      }
      if (child.userData.rotVel) {
        child.rotation.x += child.userData.rotVel.x * dt;
        child.rotation.y += child.userData.rotVel.y * dt;
      }
      if (child.material && child.material.transparent) {
        child.material.opacity = Math.max(0, 1 - progress);
      }
      child.scale.multiplyScalar(0.995);
    });
    if (exp.userData.life <= 0) {
      scene.remove(exp);
      explosions.splice(i, 1);
    }
  }

  clouds.forEach(cloud => {
    cloud.position.z += 10 * dt;
    if (cloud.position.z > 50) {
      cloud.position.z = -200;
      cloud.position.x = (Math.random() - 0.5) * 300;
    }
  });

  if (waveDelay > 0) {
    waveDelay -= dt;
    if (waveDelay <= 0) {
      spawnWave();
    }
  }

  renderer.render(scene, camera);
}

function gameOver() {
  playing = false;
  document.exitPointerLock();
  document.getElementById('game-over-screen').style.display = 'flex';
  document.getElementById('final-score').textContent = score;
}

function startGame() {
  score = 0;
  health = 250;
  ammo = maxAmmo;
  wave = 1;
  jetSpeed = 0.3;
  jetShootInterval = 6.0;
  reloading = false;
  firing = false;
  lookTarget.set(0, 0);
  lookSmooth.set(0, 0);

  jets.forEach(j => scene.remove(j));
  jets = [];
  tracers.forEach(t => scene.remove(t));
  tracers = [];
  explosions.forEach(e => scene.remove(e));
  explosions = [];
  shellCasings.forEach(s => scene.remove(s));
  shellCasings = [];

  updateHUD();
  spawnWave();

  playing = true;
  if (!isMobile) renderer.domElement.requestPointerLock();
}

let music;
let started = false;

function initMusic() {
  if (!music) {
    music = new Audio('carpet.mp3');
    music.loop = true;
    music.volume = 0.5;
  }
  music.play().catch(() => {});
}

function handleStart() {
  if (started) return;
  started = true;
  document.getElementById('start-screen').style.display = 'none';
  initMusic();
  startGame();
}

document.addEventListener('keydown', (e) => {
  if (!started && document.getElementById('start-screen').style.display !== 'none') {
    handleStart();
    return;
  }
});
document.getElementById('start-screen').addEventListener('click', handleStart);
document.getElementById('start-screen').addEventListener('touchend', (e) => { e.preventDefault(); handleStart(); }, { passive: false });

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('game-over-screen').style.display = 'none';
  started = true;
  if (music) music.play().catch(() => {});
  startGame();
});

init();
</script>
</body>
</html>
